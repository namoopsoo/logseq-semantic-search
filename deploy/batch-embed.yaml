apiVersion: batch/v1
kind: Job
metadata:
  name: batch-embed-logseq
spec:
  backoffLimit: 1
  completionMode: Indexed
  completions: 8
  parallelism: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: batch-embed
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/logseq-semantic-search:${DOCKER_TAG}
          command:
            - /bin/sh
            - -c
          args:
            - |
              export SHARD_INDEX="${JOB_COMPLETION_INDEX}"
              uv run python -m semantic_notes.index_notes
          resources:
            requests:
              cpu: "400m"
              memory: "768Mi"
            limits:
              cpu: "500m"
              memory: "2Gi"
          env:
            - name: MARKDOWN_SOURCE
              value: s3
            - name: WRITE_TO_S3
              value: "true"
            - name: WRITE_TO_CHROMA
              value: "false"
            - name: S3_MARKDOWN_PREFIX
              value: ""
            - name: S3_EMBEDDINGS_PREFIX
              value: "2026-07-04-embeddings"
            - name: SHARD_DATE_START
              value: "2024-01-01"
            - name: SHARD_DATE_END
              value: "2024-01-31"
            - name: AWS_REGION
              value: ${AWS_REGION}
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: logseq-batch-embed-env
                  key: S3_BUCKET
            - name: S3_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: logseq-batch-embed-env
                  key: S3_ENCRYPTION_KEY
            - name: SHARD_COUNT
              value: "8"
            - name: MODEL_NAME
              value: Qwen/Qwen3-Embedding-0.6B
