# EKS Pod Identity setup for this service account:
#
#   aws iam create-role \
#     --role-name logseq-embed-s3-role \
#     --assume-role-policy-document file://deploy/pod-identity-trust.json
#
#   envsubst '$S3_BUCKET' < deploy/logseq-embed-s3-policy.json | \
#     aws iam put-role-policy \
#       --role-name logseq-embed-s3-role \
#       --policy-name logseq-embed-s3-access \
#       --policy-document file:///dev/stdin
#
#   aws eks create-pod-identity-association \
#     --cluster-name logseq-embed \
#     --namespace default \
#     --service-account logseq-embed-sa \
#     --role-arn arn:aws:iam::$AWS_ACCOUNT_ID:role/logseq-embed-s3-role
#
# The batch job must set spec.template.spec.serviceAccountName: logseq-embed-sa.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logseq-embed-sa
  namespace: default
